# =============================================================
# docker-compose.yml — Orquestração completa
# Ocorrências: PostgreSQL + API Spring Boot + Frontend Angular
#
# Uso:
#   docker compose --env-file .env.development up -d --build
# =============================================================

services:

  # ── Banco de dados ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ocorrencias-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - ocorrencias-net

  # ── pgAdmin (interface web para o banco) ───────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ocorrencias-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ocorrencias-net

  # ── API Spring Boot ────────────────────────────────────────
  api:
    build:
      context: ./ocorrencias-api
      dockerfile: Dockerfile
    container_name: ocorrencias-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:      postgres
      DB_PORT:      ${DB_PORT}
      DB_NAME:      ${DB_NAME}
      DB_USER:      ${DB_USER}
      DB_PASS:      ${DB_PASS}
      JWT_SECRET:   ${JWT_SECRET}
      SERVER_PORT:  ${SERVER_PORT}
      APP_BASE_URL: ${APP_BASE_URL}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      # start_period >= tempo real de boot da JVM + Spring (~55s observado nos logs)
      # Durante start_period falhas são ignoradas — a app não é reiniciada prematuramente
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v3/api-docs || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - ocorrencias-net

  # ── Frontend Angular (Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./ocorrencias-frontend
      dockerfile: Dockerfile
    container_name: ocorrencias-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4200:80"
    restart: unless-stopped
    networks:
      - ocorrencias-net

# ── Volumes persistentes ───────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# ── Rede interna ───────────────────────────────────────────
networks:
  ocorrencias-net:
    driver: bridge