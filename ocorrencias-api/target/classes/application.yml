spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT}

app:
  base-url: ${APP_BASE_URL}
  error:
    include-message: always

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 1800000  # 30 minutos

storage:
  upload-dir: ${STORAGE_UPLOAD_DIR:/app/uploads}
  base-url: ${APP_BASE_URL}

springdoc:
  api-docs:
    path: /v3/api-docs
